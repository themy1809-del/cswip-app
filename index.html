<style>
:root{
  --bg:#0a0e17; --panel:#141b29; --panel2:#1b2334; --line:#2a3550;
  --txt:#eaeff7; --muted:#94a3bb; --accent:#ff7a33; --accent2:#4ca8ff;
  --green:#34c759; --red:#ff453a; --yellow:#ffd60a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.55}
header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#1a2738,#101a26);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:18px;font-weight:700}
header .spark{color:var(--accent)}
.lang-toggle{margin-left:auto;display:flex;gap:6px;background:var(--panel);border-radius:20px;padding:4px}
.lang-toggle button{background:none;border:none;color:var(--muted);padding:6px 12px;border-radius:16px;cursor:pointer;font-size:13px;font-weight:600}
.lang-toggle button.on{background:var(--accent);color:#1a1206}
nav{display:flex;gap:4px;overflow-x:auto;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:53px;z-index:40}
nav button{white-space:nowrap;background:none;border:1px solid var(--line);color:var(--muted);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600}
nav button.on{background:var(--accent2);color:#06121f;border-color:var(--accent2)}
main{max-width:920px;margin:0 auto;padding:18px 16px 80px}
.view{display:none}.view.on{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
.card h2{font-size:17px;margin-bottom:6px}
.card h3{font-size:15px;color:var(--accent);margin:14px 0 6px}
.muted{color:var(--muted)}
.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:10px;background:var(--panel2);color:var(--muted);margin-right:6px}
.en{color:var(--muted);font-size:14px;font-style:italic;display:block;margin-top:3px}
.lang-vi,.lang-en{display:block}
.lang-en{margin-top:2px}
body.m-both .sub{color:var(--muted);font-style:italic;font-size:.92em;margin-top:2px}
body.m-vi .lang-en{display:none}
body.m-en .lang-vi{display:none}
.timer{font-weight:700;font-size:15px;padding:4px 12px;border-radius:10px;background:var(--panel2)}
.timer.warn2{background:#3a1a1a;color:var(--red)}
.chap-list{display:grid;gap:10px}
.chap{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;transition:.15s}
.chap:hover{border-color:var(--accent2);transform:translateX(3px)}
.chap .num{width:34px;height:34px;flex:none;border-radius:9px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent)}
.chap .meta{flex:1}.chap .meta b{font-size:15px}
.chap .done{color:var(--green);font-size:18px}
.back{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:14px;margin-bottom:10px;font-weight:600}
ul.lesson{list-style:none;margin:8px 0}
ul.lesson li{padding:7px 0 7px 22px;position:relative;border-bottom:1px dashed var(--line)}
ul.lesson li:before{content:"▸";position:absolute;left:0;color:var(--accent)}
.term{font-weight:700;color:var(--txt)}
.deep-wrap{margin-top:10px}
.deep-block{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:12px;padding:12px 14px;margin:10px 0}
.deep-block h4{font-size:14px;color:var(--accent);margin-bottom:4px}
.deep-block ul.lesson{margin:4px 0 0}
.deep-block ul.lesson li:last-child{border-bottom:none}
.deep-block .deep-p{margin:8px 0;line-height:1.65}
.deep-block .deep-p .lang-vi{font-size:14.5px}
.tbl-wrap{overflow-x:auto;margin:10px 0 2px;-webkit-overflow-scrolling:touch}
table.deep-tbl{border-collapse:collapse;width:100%;font-size:13px;min-width:520px}
table.deep-tbl th,table.deep-tbl td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top}
table.deep-tbl th{background:#142233;color:var(--accent2);font-weight:700}
table.deep-tbl td:first-child{font-weight:700;color:var(--txt);white-space:nowrap}
.deep-foot{font-size:12px;margin-top:8px;font-style:italic}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:10px 0}
.tool-grid label{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
.tool-grid input,.tool-grid select{background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:8px;font-size:14px;width:100%}
.tool-out{margin-top:8px;padding:10px 12px;background:#13212d;border-left:3px solid var(--accent);border-radius:8px;font-size:15px}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.score-cell{background:var(--panel2);border-radius:10px;padding:12px;text-align:center}
.score-cell b{font-size:22px;display:block}
.score-cell span{font-size:11px;color:var(--muted)}
.flash{perspective:1200px;height:230px;margin-bottom:14px}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
.flash.flip .flash-inner{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;border:1px solid var(--line);padding:22px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.flash-front{background:var(--panel2)}
.flash-back{background:#13212d;transform:rotateY(180deg)}
.flash-face .q{font-size:19px;font-weight:700}
.flash-face .a{font-size:15px;color:var(--accent)}
.flash-face .tip{position:absolute;bottom:10px;font-size:11px;color:var(--muted)}
.row{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
.btn{background:var(--accent2);color:#06121f;border:none;border-radius:10px;padding:10px 18px;font-weight:700;cursor:pointer;font-size:14px}
.btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
.btn.ghost{background:none;color:var(--muted);border:1px solid var(--line)}
.opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:12px 14px;margin:7px 0;cursor:pointer;font-size:14px}
.opt:hover{border-color:var(--accent2)}
.opt.correct{background:#173a26;border-color:var(--green)}
.opt.wrong{background:#3a1a1a;border-color:var(--red)}
.opt.disabled{pointer-events:none;opacity:.85}
.progress{height:8px;background:var(--panel2);border-radius:6px;overflow:hidden;margin:8px 0}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--yellow));width:0}
.stat{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center}
.stat .b{background:var(--panel2);border-radius:12px;padding:14px}
.stat .b b{font-size:24px;display:block;color:var(--accent)}
.stat .b span{font-size:12px;color:var(--muted)}
.timeline{position:relative;padding-left:22px}
.timeline:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl{position:relative;margin-bottom:16px}
.tl:before{content:"";position:absolute;left:-19px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--bg)}
.tl b{color:var(--accent2)}
.q-explain{background:#102030;border-left:3px solid var(--accent2);padding:10px 12px;border-radius:8px;margin-top:10px;font-size:13px}
footer{text-align:center;color:var(--muted);font-size:12px;padding:20px}
code{background:#0a121b;padding:1px 6px;border-radius:5px;color:var(--yellow);font-size:13px}
.warn{background:#2a1f0a;border:1px solid #5a4410;border-radius:10px;padding:12px;font-size:13px;margin-top:10px}
@media(max-width:520px){header h1{font-size:15px}.flash{height:260px}}
/* ===== MODERN SKIN ===== */

 radial-gradient(1100px 560px at 82% -8%, rgba(255,122,51,.10), transparent 58%),

 var(--bg);background-attachment:fixed}

.opt:hover{border-color:var(--accent2);background:rgba(76,168,255,.07)}
.tool-grid input,.tool-grid select{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.11);border-radius:10px;transition:.18s}
.tool-grid input:focus,.tool-grid select:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 3px rgba(76,168,255,.18)}
.stat .b,.score-cell{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));border:1px solid rgba(255,255,255,.07);box-shadow:0 6px 18px rgba(0,0,0,.2)}
.deep-block{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.08);border-left:3px solid var(--accent);border-radius:14px}
table.deep-tbl th{background:rgba(76,168,255,.1)}
.q-explain,.tool-out{border-radius:10px}
.back{transition:.18s}.back:hover{filter:brightness(1.2)}

<script>
/* ====== APP LOGIC ====== */
let LANG = localStorage.getItem('cswip_lang')||'both';
let PROG = JSON.parse(localStorage.getItem('cswip_prog')||'{}'); // {chapIndex:true}
let QUIZSTATE = JSON.parse(localStorage.getItem('cswip_quiz')||'{}');
let USER = JSON.parse(localStorage.getItem('cswip_user')||'{}');
let SRS = JSON.parse(localStorage.getItem('cswip_srs')||'{}');

function save(){localStorage.setItem('cswip_prog',JSON.stringify(PROG));localStorage.setItem('cswip_quiz',JSON.stringify(QUIZSTATE));}
function setLang(l){LANG=l;localStorage.setItem('cswip_lang',l);
  ['en','both','vi'].forEach(x=>document.getElementById('lang-'+x).classList.toggle('on',l===x));
  document.body.classList.remove('m-en','m-both','m-vi');
  document.body.classList.add('m-'+l);
  renderAll();
}
// Bài học: tiếng Việt là chính (dễ hiểu), tiếng Anh phụ
function bili(vi,en){
  return `<span class="lang-vi">${vi}</span>${en?`<span class="lang-en sub">${en}</span>`:''}`;
}
// Câu hỏi/đáp án: tiếng Anh là chính (sát đề thật), tiếng Việt phụ
function biliE(vi,en){
  return `<span class="lang-en">${en}</span>${vi?`<span class="lang-vi sub">${vi}</span>`:''}`;
}

const TABS=[['home','🏠 Tổng quan'],['learn','📚 Bài học'],['flash','🃏 Flashcard'],['quiz','📝 Quiz'],['tools','🛠️ Công cụ'],['profile','👤 Hồ sơ'],['plan','🗓️ Lộ trình'],['tutor','🤖 AI Gia sư']];
function buildNav(){
  document.getElementById('nav').innerHTML=TABS.map(([k,t])=>`<button data-t="${k}" onclick="go('${k}')">${t}</button>`).join('');
}
let CUR='home';
function go(t){CUR=t;
  if(t!=='quiz'&&typeof QTIMER!=='undefined'&&QTIMER){clearInterval(QTIMER);QTIMER=null;if(typeof Qmode!=='undefined')Qmode='menu';}
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('v-'+t).classList.add('on');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  document.body.classList.remove('nav-open');
  window.scrollTo(0,0); renderAll();
}

/* ---------- HOME ---------- */
function renderHome(){
  const total=DATA.chapters.length;
  const done=Object.keys(PROG).filter(k=>PROG[k]).length;
  const quizDone=Object.keys(QUIZSTATE).length;
  let qTotal=0;DATA.chapters.forEach(c=>qTotal+=c.quiz.length);
  let qRight=0;Object.values(QUIZSTATE).forEach(v=>{if(v.correct)qRight++;});
  document.getElementById('v-home').innerHTML=`
  <div class="card">
    <h2>👋 ${bili('Chào bạn! Sẵn sàng chinh phục CSWIP 3.1','Ready to conquer CSWIP 3.1')}</h2>
    <p class="muted" style="margin-top:6px">${bili('Chứng chỉ Thanh tra Hàn (Welding Inspector) của TWI. Đề gồm 5 bài: Lý thuyết tổng quát, Thực hành tấm (plate), Thực hành ống (pipe), Macro & lý thuyết liên quan. Mỗi phần cần ~70% để đậu.','CSWIP 3.1 = TWI Welding Inspector. 5 papers; pass ~70% each.')}</p>
    <p class="muted" style="margin-top:8px;font-size:12px">📘 ${bili('Nội dung biên soạn bám theo giáo trình chính thức <b>WIS5 – CSWIP 3.1 (TWI, April 2020)</b> và phụ lục thực hành bạn cung cấp.','Based on the official WIS5 – CSWIP 3.1 course notes (TWI, April 2020) & your appendices.')}</p>

/* ---------- QUIZ ENGINE (chương + ngân hàng + thi có giờ) ---------- */
let Qz=[],Qi=0,Qscore=0,Qmode='menu',QtimedSecs=0,QTIMER=null,Qanswers=[],Qsource=null;

// Chuẩn hóa câu hỏi từ 2 nguồn về 1 dạng chung
function normChap(q,id,cat){return {qv:q.vi,qe:q.en,ov:q.opts.map(o=>o.vi),oe:q.opts.map(o=>o.en),a:q.ans,ev:q.exp?q.exp.vi:'',ee:q.exp?q.exp.en:'',id,cat};}
function normBank(q,id){return {qv:q.qv,qe:q.q,ov:q.ov,oe:q.o,a:q.a,ev:q.ev||'',ee:q.e||'',id,cat:q.c};}
function poolChapters(){let a=[];DATA.chapters.forEach((c,ci)=>c.quiz.forEach((q,qi)=>a.push(normChap(q,'c'+ci+'-'+qi,c.vi))));return a;}
function poolBank(){return (typeof BANK!=='undefined')?BANK.map((q,i)=>normBank(q,'b'+i)):[];}
function poolReal(){return (typeof REALBANK!=='undefined')?REALBANK.map((q,i)=>normBank(q,'r'+i)):[];}
function poolCWI(){return (typeof CWIBANK!=='undefined')?CWIBANK.map((q,i)=>normBank(q,'w'+i)):[];}
function poolAll(){return poolChapters().concat(poolBank()).concat(poolReal()).concat(poolCWI());}
function bankCats(){const s={};poolBank().forEach(q=>s[q.cat]=(s[q.cat]||0)+1);return s;}
function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function startSet(pool,timedSecs,label){
  Qz=shuffle(pool.slice());Qi=0;Qscore=0;Qanswers=[];Qsource={pool,label};
  Qmode=timedSecs?'timed':'practice';QtimedSecs=timedSecs||0;_timedOrig=timedSecs||0;
  if(QTIMER){clearInterval(QTIMER);QTIMER=null;}
  if(timedSecs){QTIMER=setInterval(tick,1000);}
  renderQuiz();
}
function startChap(ci){startSet(poolChapters().filter(q=>q.id.startsWith('c'+ci+'-')),0);}
function startCat(cat){startSet(poolBank().filter(q=>q.cat===cat),0);}
function startFullMock(){startSet(poolAll(),0,'Full');}
function startReal(){startSet(poolReal(),0,'Real');}
function startCWI(){startSet(poolCWI(),0,'CWI');}
function saveSRS(){localStorage.setItem('cswip_srs',JSON.stringify(SRS));}
function srsUpdate(id,right){if(!id)return;const now=Date.now(),day=86400000;let s=SRS[id]||{intv:0,reps:0};if(right){s.reps=(s.reps||0)+1;s.intv=s.intv?Math.min(Math.round(s.intv*2.3),150):1;s.due=now+s.intv*day;}else{s.reps=0;s.intv=0;s.due=now+600000;}SRS[id]=s;saveSRS();}
function _dueCount(){const now=Date.now();return poolAll().filter(q=>q.id&&SRS[q.id]&&SRS[q.id].due<=now).length;}
function startSmart(){const now=Date.now();const all=poolAll();const due=all.filter(q=>q.id&&SRS[q.id]&&SRS[q.id].due<=now).sort((a,b)=>SRS[a.id].due-SRS[b.id].due);const wrong=shuffle(all.filter(q=>q.id&&QUIZSTATE[q.id]&&!QUIZSTATE[q.id].correct&&!(SRS[q.id]&&SRS[q.id].due>now)));const fresh=shuffle(all.filter(q=>q.id&&!SRS[q.id]&&!QUIZSTATE[q.id]));const seen={};let set=[];due.concat(wrong,fresh).forEach(q=>{if(!seen[q.id]){seen[q.id]=1;set.push(q);}});set=set.slice(0,20);if(!set.length)set=shuffle(all.slice()).slice(0,20);startSet(set,0,'Smart');}
function startWeak(){const acc={};poolAll().forEach(q=>{if(q.id&&QUIZSTATE[q.id]){const c=q.cat||'?';acc[c]=acc[c]||{n:0,k:0};acc[c].n++;if(QUIZSTATE[q.id].correct)acc[c].k++;}});const weak=new Set(Object.keys(acc).filter(c=>acc[c].n>=2&&acc[c].k/acc[c].n<0.7));let set;if(weak.size){set=poolAll().filter(q=>weak.has(q.cat||'?'));set.sort((a,b)=>{const wa=QUIZSTATE[a.id]&&!QUIZSTATE[a.id].correct?0:(QUIZSTATE[a.id]?2:1);const wb=QUIZSTATE[b.id]&&!QUIZSTATE[b.id].correct?0:(QUIZSTATE[b.id]?2:1);return wa-wb;});set=shuffle(set.slice(0,40)).slice(0,20);}else{set=shuffle(poolAll().filter(q=>q.id&&QUIZSTATE[q.id]&&!QUIZSTATE[q.id].correct));set=set.length>=10?set.slice(0,20):shuffle(poolAll().slice()).slice(0,20);}startSet(set,0,'Weak');}
function _topicBreak(){if(!Qz||!Qz.length)return '';const t={};Qz.forEach((q,i)=>{const c=q.cat||'?';t[c]=t[c]||{n:0,k:0};t[c].n++;if(Qanswers[i]===q.a)t[c].k++;});const cats=Object.keys(t);if(cats.length<2)return '';const rows=cats.sort((a,b)=>(t[a].k/t[a].n)-(t[b].k/t[b].n)).map(c=>{const p=Math.round(t[c].k/t[c].n*100);return '<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px dashed var(--line)"><span>'+c+'</span><span style="color:'+(p>=70?'var(--green)':'var(--accent)')+'">'+t[c].k+'/'+t[c].n+' ('+p+'%)</span></div>';}).join('');return '<div class="card"><h3>📊 '+bili('Phân tích theo chủ đề','By-topic breakdown')+'</h3>'+rows+'</div>';}
function startTimed(n,mins){let p=shuffle(poolAll().slice()).slice(0,n);startSet(p,mins*60,'Timed');}
function tick(){QtimedSecs--;const t=document.getElementById('timer');if(t){t.textContent=fmt(QtimedSecs);t.classList.toggle('warn2',QtimedSecs<=60);}if(QtimedSecs<=0){clearInterval(QTIMER);QTIMER=null;Qi=Qz.length;renderQuiz();}}
function fmt(s){s=Math.max(0,s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

  const el=document.getElementById('v-quiz');
  if(Qmode==='menu'){
    const cats=bankCats();
    el.innerHTML=`
    <div class="card"><h2>📝 ${bili('Luyện tập & Thi thử','Practice & Mock exam')}</h2>
      <p class="muted">${bili('Tổng ngân hàng: '+poolAll().length+' câu (đề thật + giáo trình WIS5). Đề thi thật bằng tiếng Anh — bấm nút EN để luyện sát đề.','Bank: '+poolAll().length+' questions. Real exam is in English — use EN mode.')}</p>

    </div>

      <div class="row" style="justify-content:flex-start;margin-top:6px">
        <button class="btn" onclick="startTimed(20,20)">20 ${bili('câu','Q')} / 20'</button>
        <button class="btn" onclick="startTimed(30,45)">30 ${bili('câu','Q')} / 45'</button>
        <button class="btn" onclick="startTimed(40,60)">40 ${bili('câu','Q')} / 60'</button>
      </div>
      <p class="muted" style="font-size:12px;margin-top:8px">${bili('Có đồng hồ đếm ngược, không hiện đáp án tới khi nộp/hết giờ. Mốc đậu 70%.','Countdown timer, answers hidden until submit. Pass 70%.')}</p>
    </div>
    <div class="card"><h3>★ ${bili('Luyện tập (hiện đáp án ngay)','Practice (instant feedback)')}</h3>
      <div class="chap-list" style="margin-top:8px">
        <div class="chap" onclick="startReal()"><div class="num">🎯</div><div class="meta"><b>${bili('Đề thật CÓ ĐÁP ÁN','Real exam WITH answers')}</b><div class="muted" style="font-size:12px">${poolReal().length} ${bili('câu từ practice paper, đã chấm đáp án','real questions, answer-keyed')}</div></div></div>
        <div class="chap" onclick="startCWI()"><div class="num">🇺🇸</div><div class="meta"><b>${bili('Đề CWI (AWS) — có đáp án','CWI exam bank (AWS)')}</b><div class="muted" style="font-size:12px">${typeof poolCWI==='function'?poolCWI().length:0} ${bili('câu từ "1001 Q&A for CWI", đáp án gốc','questions from 1001 Q&A, answer-keyed')}</div></div></div>
        <div class="chap" onclick="startFullMock()"><div class="num">∑</div><div class="meta"><b>${bili('Tất cả ngân hàng','Whole bank')}</b><div class="muted" style="font-size:12px">${poolAll().length} ${bili('câu, trộn ngẫu nhiên','questions shuffled')}</div></div></div>
      </div>
    </div>
    <div class="card"><h3>📂 ${bili('Theo chủ đề (ngân hàng đề thật)','By topic (real-exam bank)')}</h3>
      <div class="chap-list" style="margin-top:8px">
      ${Object.keys(cats).map(c=>`<div class="chap" onclick="startCat('${c.replace(/'/g,"\\'")}')"><div class="num">Q</div><div class="meta"><b>${c}</b><div class="muted" style="font-size:12px">${cats[c]} ${bili('câu','Q')}</div></div></div>`).join('')}
      </div>
    </div>
    <div class="card"><h3>📖 ${bili('Theo chương giáo trình','By syllabus chapter')}</h3>
      <div class="chap-list" style="margin-top:8px">
      ${DATA.chapters.map((c,i)=>`<div class="chap" onclick="startChap(${i})"><div class="num">${i+1}</div><div class="meta"><b>${bili(c.vi,c.en)}</b><div class="muted" style="font-size:12px">${c.quiz.length} ${bili('câu','Q')}</div></div></div>`).join('')}
      </div>
    </div>`;
    return;
  }
  if(Qi>=Qz.length){
    if(QTIMER){clearInterval(QTIMER);QTIMER=null;}
    const pct=Qz.length?Math.round(Qscore/Qz.length*100):0;
    let review='';
    if(Qmode==='timed'){
      review=`<div class="card"><h3>${bili('Xem lại bài làm','Review')}</h3>`+Qz.map((q,i)=>{
        const a=Qanswers[i];const ok=a===q.a;
        return `<div style="padding:10px 0;border-bottom:1px dashed var(--line)">
          <div style="font-size:13px">${ok?'✅':'❌'} <b>${i+1}.</b> ${biliE(q.qv,q.qe)}</div>
          <div class="q-explain" style="margin-top:6px">${bili('Đáp án đúng: ','Answer: ')}${biliE(q.ov[q.a],q.oe[q.a])}${(q.ee||q.ev)?'<br>'+biliE(q.ev,q.ee):''}</div>
        </div>`;}).join('')+`</div>`;
    }
    el.innerHTML=`<div class="card" style="text-align:center">
      <h2>${pct>=70?'🎉':'💪'} ${bili('Kết quả','Result')}</h2>
      <div class="stat" style="margin-top:14px"><div class="b"><b>${Qscore}/${Qz.length}</b><span>${bili('Đúng','Correct')}</span></div>
      <div class="b" style="grid-column:span 2"><b style="color:${pct>=70?'var(--green)':'var(--red)'}">${pct}%</b><span>${pct>=70?bili('ĐẠT (≥70%)','PASS'):bili('Chưa đạt — ôn lại','Below pass')}</span></div></div>
      <div class="row" style="margin-top:16px"><button class="btn" onclick="startSet(Qsource.pool,${Qmode==='timed'?_timedOrig:0})">🔁 ${bili('Làm lại','Retry')}</button><button class="btn sec" onclick="quizMenu()">${bili('Về menu','Menu')}</button></div>

    <h2 style="margin:12px 0">${biliE(q.qv,q.qe)}</h2>
    <div id="opts">${q.oe.map((o,oi)=>`<button class="opt" onclick="answer(${oi})">${biliE(q.ov[oi],o)}</button>`).join('')}</div>

  </div>`;
}
function answer(oi){
  const q=Qz[Qi];Qanswers[Qi]=oi;
  const right=oi===q.a;if(right)Qscore++;
  if(q.id){QUIZSTATE[q.id]={correct:right};srsUpdate(q.id,right);}save();
  if(Qmode==='timed'){Qi++;renderQuiz();return;}
  const opts=document.querySelectorAll('#opts .opt');
  opts.forEach((b,i)=>{b.classList.add('disabled');if(i===q.a)b.classList.add('correct');if(i===oi&&oi!==q.a)b.classList.add('wrong');});
  document.getElementById('exp').innerHTML=`<div class="q-explain">${right?'✅ '+bili('Chính xác','Correct'):'❌ '+bili('Đáp án đúng: ','Correct answer: ')+biliE(q.ov[q.a],q.oe[q.a])}${(q.ee||q.ev)?'<br>'+biliE(q.ev,q.ee):''}</div>
    <div class="row" style="margin-top:12px;justify-content:flex-end"><button class="btn" onclick="Qi++;renderQuiz()">${Qi+1>=Qz.length?bili('Xem kết quả','See result'):bili('Câu tiếp','Next')} →</button></div>`;
}

/* ---------- PROFILE (Hồ sơ & chấm điểm) ---------- */
function _scoreStats(){
  const total=DATA.chapters.length;
  const done=Object.keys(PROG).filter(k=>PROG[k]).length;
  const ans=Object.keys(QUIZSTATE).length;
  const correct=Object.keys(QUIZSTATE).filter(k=>QUIZSTATE[k]&&QUIZSTATE[k].correct).length;
  const pct=ans?Math.round(correct/ans*100):0;
  let qTotal=0;DATA.chapters.forEach(c=>qTotal+=c.quiz.length);
  return {total,done,ans,correct,pct,qTotal};
}

function resetProgress(){if(confirm('Xóa toàn bộ tiến độ và điểm? / Clear all progress & scores?')){PROG={};QUIZSTATE={};save();renderAll();}}

function printScorecard(){
  const s=_scoreStats();
  const today=new Date().toLocaleDateString('vi-VN');
  const row=function(a,b){return '<tr><td style="padding:6px 8px;color:#444">'+a+'</td><td style="padding:6px 8px;font-weight:700">'+b+'</td></tr>';};
  let h='<div style="background:#fff;color:#111;border:2px solid #111;border-radius:10px;padding:20px;max-width:560px;font-family:Arial,sans-serif">'
    +'<div style="text-align:center;border-bottom:2px solid #111;padding-bottom:8px;margin-bottom:12px"><b style="font-size:18px">BẢNG ĐIỂM ÔN TẬP CSWIP 3.1</b><br><span style="font-size:12px;color:#555">CSWIP 3.1 Study Scorecard · '+today+'</span></div>'
    +'<table style="width:100%;border-collapse:collapse;font-size:14px">'
    +row('Họ tên / Name', _esc(USER.name)||'—');
  if(USER.org)h+=row('Đơn vị / Company', _esc(USER.org));
  if(USER.contact)h+=row('Liên hệ / Contact', _esc(USER.contact));
  h+=row('Chương hoàn thành / Chapters', s.done+' / '+s.total)
    +row('Quiz đúng / đã làm', s.correct+' / '+s.ans)
    +row('Tỉ lệ đúng / Accuracy', s.pct+'%')
    +'</table>'
    +'<p style="font-size:11px;color:#666;margin-top:10px">Tự đánh giá ôn tập — KHÔNG phải chứng chỉ chính thức. / Self-study record — NOT an official certificate.</p></div>';
  const w=window.open('','_blank'); if(!w){alert('Cho phép pop-up để in.');return;}
  w.document.write('<html><head><title>Scorecard</title><meta charset="utf-8"></head><body style="margin:16px">'+h+'</body></html>');
  w.document.close();w.focus();setTimeout(function(){w.print();},300);
}

function _wv(id){const el=document.getElementById(id);const v=(el&&el.value||'').trim();return v||'—';}
function genWPS(){
  const proc=_wv('w_proc');
  const k = proc.indexOf('121')===0?1 : proc.indexOf('141')===0?0.6 : 0.8;
  const a=parseFloat(_wv('w_amp')), v=parseFloat(_wv('w_volt')), s=parseFloat(_wv('w_spd'));
  let hi='—';
  if(a>0&&v>0&&s>0) hi=((a*v*60*k)/(s*1000)).toFixed(2)+' kJ/mm (k='+k+')';
  const rows=[
    ['Công ty / Company', _wv('w_co')],
    ['Số WPS / WPS No.', _wv('w_no')],
    ['PQR ref', _wv('w_pqr')],
    ['Tiêu chuẩn / Code', _wv('w_code')],
    ['Quá trình / Process', proc],
    ['Mối nối / Joint', _wv('w_joint')],
    ['Vật liệu nền / Base metal', _wv('w_base')],
    ['Chiều dày / Thickness (mm)', _wv('w_thk')],
    ['Đường kính / Diameter (mm)', _wv('w_dia')],
    ['Que/dây / Filler', _wv('w_fill')+'  Ø'+_wv('w_fdia')+' mm'],
    ['Khí bảo vệ / Shielding', _wv('w_gas')],
    ['Vị trí / Position', _wv('w_pos')],
    ['Tiền nhiệt / Preheat (°C)', _wv('w_pre')],
    ['Interpass max (°C)', _wv('w_inter')],
    ['PWHT', _wv('w_pwht')],
    ['Dòng & cực / Current & pol.', _wv('w_cur')],
    ['Dòng / Amps (A)', _wv('w_amp')],
    ['Điện áp / Volts (V)', _wv('w_volt')],
    ['Tốc độ / Travel (mm/min)', _wv('w_spd')],
    ['Nhiệt đầu vào / Heat input', hi]
  ];
  const today=new Date().toLocaleDateString('vi-VN');
  const doc='<div id="wps_print" style="background:#fff;color:#111;border:1px solid #ccc;border-radius:8px;padding:16px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #111;padding-bottom:6px;margin-bottom:8px">'
    +'<b style="font-size:15px">WELDING PROCEDURE SPECIFICATION (WPS)</b><span style="font-size:12px;color:#444">'+today+'</span></div>'
    +'<table style="width:100%;border-collapse:collapse;font-size:13px">'
    +rows.map(r=>'<tr><td style="border:1px solid #bbb;padding:5px 8px;width:48%;color:#444">'+r[0]+'</td><td style="border:1px solid #bbb;padding:5px 8px;font-weight:600">'+r[1]+'</td></tr>').join('')
    +'</table>'
    +'<p style="font-size:11px;color:#666;margin-top:8px">Tham khảo — cần kỹ sư duyệt & PQR chống lưng. / Indicative — requires engineer approval & a supporting PQR.</p></div>';
  document.getElementById('wps_doc').innerHTML=doc;
  document.getElementById('w_print').style.display='';
}
function printWPS(){
  const el=document.getElementById('wps_print'); if(!el)return;
  const w=window.open('','_blank'); if(!w){alert('Cho phép pop-up để in.');return;}
  w.document.write('<html><head><title>WPS</title><meta charset="utf-8"></head><body style="font-family:Arial,sans-serif;margin:16px">'+el.outerHTML+'</body></html>');
  w.document.close(); w.focus(); setTimeout(function(){w.print();},300);
}
function _tn(id){const v=parseFloat(document.getElementById(id).value);return isNaN(v)?0:v;}
function calcCEV(){
  const ce=_tn('cev_C')+_tn('cev_Mn')/6+(_tn('cev_Cr')+_tn('cev_Mo')+_tn('cev_V'))/5+(_tn('cev_Ni')+_tn('cev_Cu'))/15;
  let note;
  if(ce<0.40)note=bili('Dễ hàn — thường không cần tiền nhiệt (vẫn kiểm tra chiều dày).','Readily weldable — usually no preheat (still check thickness).');
  else if(ce<0.45)note=bili('Cân nhắc tiền nhiệt ~100°C; kiểm soát hydro.','Consider ~100°C preheat; control hydrogen.');
  else if(ce<0.50)note=bili('Cần tiền nhiệt ~150°C, que ít hydro.','Preheat ~150°C, low-hydrogen consumables.');
  else note=bili('Tôi cứng mạnh: tiền nhiệt ~200°C+, kiểm soát chặt, cân nhắc PWHT.','Highly hardenable: ~200°C+ preheat, tight control, consider PWHT.');
  document.getElementById('cev_out').innerHTML='<b>CEV = '+ce.toFixed(2)+'</b><br><span class="muted" style="font-size:12px">'+note+' — '+bili('tham khảo, tra EN 1011-2 / AWS D1.1','indicative, see EN 1011-2 / AWS D1.1')+'</span>';
}
function calcHI(){
  const s=_tn('hi_s'); const out=document.getElementById('hi_out');
  if(s<=0){out.innerHTML='HI = —';return;}
  const hi=(_tn('hi_a')*_tn('hi_v')*60*parseFloat(document.getElementById('hi_k').value))/(s*1000);
  out.innerHTML='<b>HI = '+hi.toFixed(2)+' kJ/mm</b>';
}
function calcFillet(from){
  if(from==='z')document.getElementById('fa').value=(_tn('fz')*0.7).toFixed(1);
  else document.getElementById('fz').value=(_tn('fa')/0.7).toFixed(1);
  document.getElementById('f_out').innerHTML='<b>a = '+_tn('fa').toFixed(1)+' mm · z = '+_tn('fz').toFixed(1)+' mm</b>';
}
function calcPreheat(){
  const ce=_tn('ph_ce'), t=_tn('ph_t'), h=document.getElementById('ph_h').value;
  let base;
  if(ce<0.40)base=0; else if(ce<0.45)base=75; else if(ce<0.50)base=125; else if(ce<0.55)base=175; else base=225;
  if(t>=20&&t<40)base+=25; else if(t>=40&&t<60)base+=50; else if(t>=60)base+=75;
  if(h==='high')base+=50; else if(h==='med')base+=25;
  base=Math.round(base/25)*25;
  const out=document.getElementById('ph_out');
  if(base<=0&&t<20) out.innerHTML='<b>'+bili('Thường không cần tiền nhiệt','Usually no preheat')+'</b><br><span class="muted" style="font-size:12px">'+bili('vẫn kiểm tra ẩm & ràng buộc — tham khảo EN 1011-2','still check moisture & restraint — see EN 1011-2')+'</span>';
  else out.innerHTML='<b>'+bili('Tiền nhiệt ước lượng','Estimated preheat')+': ~'+Math.max(base,20)+'°C</b><br><span class="muted" style="font-size:12px">'+bili('chỉ tham khảo — tra EN 1011-2 / AWS D1.1 / WPS dự án','indicative — see EN 1011-2 / AWS D1.1 / project WPS')+'</span>';
}
